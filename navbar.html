<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090B;
      color: #F5F5F5;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Navbar ─── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(9, 9, 11, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(9, 9, 11, 0.85);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ─── Logo ─── */
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #F5F5F5;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .logo:hover {
      color: #64FFDA;
    }

    .logo-accent {
      color: #64FFDA;
    }

    /* ─── Desktop Nav ─── */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      position: relative;
      font-size: 0.875rem;
      font-weight: 500;
      color: #A1A1AA;
      text-decoration: none;
      padding: 4px 0;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #64FFDA;
      border-radius: 2px;
      transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-links a:hover {
      color: #F5F5F5;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a.active {
      color: #64FFDA;
    }

    .nav-links a.active::after {
      width: 100%;
    }

    /* ─── Hamburger ─── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 110;
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: #F5F5F5;
      border-radius: 2px;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.2s ease;
      transform-origin: center;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* ─── Mobile Menu ─── */
    .mobile-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: min(320px, 75vw);
      height: 100vh;
      background: rgba(17, 18, 22, 0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      padding: 80px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 105;
    }

    .mobile-menu.open {
      transform: translateX(0);
    }

    .mobile-menu a {
      font-size: 1.125rem;
      font-weight: 500;
      color: #A1A1AA;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 8px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .mobile-menu a:hover,
    .mobile-menu a.active {
      color: #64FFDA;
      background: rgba(100, 255, 218, 0.06);
    }

    /* ─── Overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 104;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Section Spacer ─── */
    .spacer {
      height: 64px;
    }

    section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 600;
      color: #A1A1AA;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    section:nth-child(odd) {
      background: #111216;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="#home" class="logo">Tamer<span class="logo-accent">.</span></a>

      <ul class="nav-links" id="navLinks">
        <li><a href="#home" class="active">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- Page Content -->
  <div class="spacer"></div>
  <section id="home">Home</section>
  <section id="projects">Projects</section>
  <section id="about">About</section>
  <section id="contact">Contact</section>

  <script>
    (function () {
      const navbar = document.getElementById('navbar');
      const hamburger = document.getElementById('hamburger');
      const overlay = document.getElementById('overlay');
      const mobileMenu = document.getElementById('mobileMenu');
      const mobileLinks = mobileMenu.querySelectorAll('a');
      const desktopLinks = document.querySelectorAll('#navLinks a');
      const allLinks = document.querySelectorAll('nav a, .mobile-menu a');
      const sections = document.querySelectorAll('section[id]');

      /* ─── Scroll: add shadow class ─── */
      function onScroll() {
        navbar.classList.toggle('scrolled', window.scrollY > 20);

        /* Active link detection */
        let current = '';
        sections.forEach((sec) => {
          const top = sec.offsetTop - 100;
          const bottom = top + sec.offsetHeight;
          if (window.scrollY >= top && window.scrollY < bottom) {
            current = sec.getAttribute('id');
          }
        });

        desktopLinks.forEach((link) => {
          link.classList.toggle('active', link.getAttribute('href') === '#' + current);
        });

        mobileLinks.forEach((link) => {
          link.classList.toggle('active', link.getAttribute('href') === '#' + current);
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();

      /* ─── Toggle mobile menu ─── */
      function openMenu() {
        hamburger.classList.add('open');
        hamburger.setAttribute('aria-expanded', 'true');
        mobileMenu.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeMenu() {
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        mobileMenu.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      hamburger.addEventListener('click', () => {
        hamburger.classList.contains('open') ? closeMenu() : openMenu();
      });

      overlay.addEventListener('click', closeMenu);

      /* ─── Close menu on link click ─── */
      allLinks.forEach((link) => {
        link.addEventListener('click', (e) => {
          const href = link.getAttribute('href');
          if (href && href.startsWith('#')) {
            e.preventDefault();
            const target = document.querySelector(href);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth' });
            }
            closeMenu();
          }
        });
      });

      /* ─── Handle escape key ─── */
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && mobileMenu.classList.contains('open')) {
          closeMenu();
        }
      });

      /* ─── Handle resize ─── */
      window.addEventListener('resize', () => {
        if (window.innerWidth > 768 && mobileMenu.classList.contains('open')) {
          closeMenu();
        }
      });
    })();
  </script>
</body>
</html>
